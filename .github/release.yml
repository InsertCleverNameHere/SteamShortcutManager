changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "🆕 New Features"
      labels:
        - enhancement
        - feature
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "🔒 Security"
      labels:
        - security
    - title: "🏗️ Internal"
      labels:
        - chore
        - refactor
        - dependencies
    - title: "📝 Other Changes"
      labels: ["*"]